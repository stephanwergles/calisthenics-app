<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14171a">
<title>Calisthenics · 3er-Split</title>
<style>
  :root {
    --bg: #14171a; --card: #1d2126; --card2: #262b31; --line: #2e343b;
    --text: #e9e7df; --muted: #8e939b;
    --amber: #f2c94c; --amber-dim: rgba(242,201,76,.12);
    --chalk: #f4f2ea;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body { background: var(--bg); color: var(--text); font: 16px/1.55 -apple-system, "Segoe UI", Roboto, sans-serif; padding-bottom: 158px; }
  .display { font-stretch: condensed; text-transform: uppercase; letter-spacing: .03em; font-weight: 700; }

  header { padding: 26px 20px 6px; display: flex; align-items: baseline; gap: 10px; }
  header h1 { font-size: 28px; }
  header span { color: var(--muted); font-size: 13px; }

  .tabs { display: flex; gap: 8px; padding: 14px 20px 10px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .tabs button { flex: 1; padding: 10px 0 8px; border: 1px solid var(--line); border-radius: 12px; background: var(--card); color: var(--muted); cursor: pointer; transition: all .15s; font-size: 19px; line-height: 1.1; font-family: inherit; }
  .tabs button small { display: block; font-size: 11px; font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--muted); font-stretch: normal; }
  .tabs button.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
  .tabs button.active small { color: var(--amber); opacity: .75; }

  .progress { height: 3px; background: var(--card2); margin: 0 20px; border-radius: 2px; overflow: hidden; }
  .progress i { display: block; height: 100%; background: var(--amber); width: 0; transition: width .3s; }

  .day { display: none; padding: 10px 20px 0; }
  .day.active { display: block; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; }
  .block { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
  .block .lvl { color: var(--amber); letter-spacing: .04em; font-weight: 700; border: 1px solid var(--amber); background: var(--amber-dim); border-radius: 20px; padding: 2px 9px; font-size: 10.5px; }
  .block.skill { color: var(--amber); }
  .block.kraft { color: #7fb3d5; }
  .block.core, .block.zubehör, .block.extra { color: var(--muted); }
  .card h3 { font-size: 17px; font-weight: 600; letter-spacing: -.01em; }
  .meta { color: var(--muted); font-size: 13.5px; margin: 3px 0 8px; }
  .meta b { color: var(--text); font-weight: 600; }
  .meta a { color: var(--amber); text-decoration: none; font-weight: 600; }
  .last { color: var(--muted); font-size: 12.5px; margin-bottom: 9px; }

  .unlock { display: block; width: 100%; margin: 0 0 11px; padding: 12px; border-radius: 10px; border: 1px solid var(--amber); background: var(--amber-dim); color: var(--amber); font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; text-align: left; }

  details { margin: 0 0 11px; }
  summary { list-style: none; cursor: pointer; color: var(--muted); font-size: 14.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; user-select: none; padding: 10px 12px; background: var(--card2); border-radius: 10px; }
  details[open] summary { border-radius: 10px 10px 0 0; color: var(--text); }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "▸"; transition: transform .15s; display: inline-block; }
  details[open] summary::before { transform: rotate(90deg); }
  .detail-body { background: var(--card2); border-radius: 0 0 10px 10px; padding: 4px 14px 14px; }
  .detail-top { display: flex; gap: 14px; align-items: center; margin-bottom: 4px; }
  .detail-top svg { flex: 0 0 104px; height: 76px; }
  .detail-top p, .detail-body .sec { color: var(--muted); font-size: 13.5px; line-height: 1.55; }
  .detail-body .sec { margin-top: 8px; }
  .detail-body .sec b { color: var(--text); display: block; font-size: 12px; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 2px; }
  .detail-body .sec.warn b { color: #e59a9a; }
  .ladder { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); font-size: 13px; }
  .ladder-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin-bottom: 8px; }
  .ladder .step { display: flex; gap: 10px; align-items: center; position: relative; padding: 5px 0; color: var(--muted); }
  .ladder .step .dot {
    flex: 0 0 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--line); background: var(--card); font-size: 11px; z-index: 1;
  }
  .ladder .step:not(:last-of-type) .dot::after {
    content: ""; position: absolute; left: 11px; top: 29px; width: 2px; height: 14px; background: var(--line);
  }
  .ladder .step.done { color: var(--text); }
  .ladder .step.done .dot { background: var(--chalk); border-color: var(--chalk); color: #14171a; font-weight: 700; }
  .ladder .step.cur { color: var(--amber); font-weight: 600; }
  .ladder .step.cur .dot { border-color: var(--amber); background: var(--amber-dim); box-shadow: 0 0 0 3px var(--amber-dim); }
  .ladder .step.cur .dot::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--amber); }
  .ladder .step.locked .dot { opacity: .55; font-size: 10px; }
  .ladder .stepname em { display: block; font-style: normal; font-size: 11px; font-weight: 500; color: var(--amber); opacity: .8; }
  .ladder-btns { display: flex; gap: 8px; margin-top: 10px; }
  .ladder .lvlbtn { padding: 9px 12px; border-radius: 9px; border: 1px solid var(--line); background: var(--card); color: var(--muted); font-size: 12.5px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .ladder .lvlbtn.amber { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }

  .sets { display: flex; gap: 9px; flex-wrap: wrap; }
  .set { min-width: 42px; height: 42px; padding: 0 6px; border-radius: 21px; border: 2px solid var(--line); background: var(--card2); color: var(--muted); font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s; }
  .set:active { transform: scale(.92); }
  .set.done { background: var(--chalk); border-color: var(--chalk); color: #14171a; box-shadow: 0 0 0 3px rgba(244,242,234,.12); }

  .reset { margin: 16px 0 26px; width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: none; color: var(--muted); font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; }

  .editor { position: fixed; left: 0; right: 0; bottom: 0; z-index: 30; background: var(--card); border-top: 1px solid var(--amber); padding: 16px 20px calc(16px + env(safe-area-inset-bottom)); transform: translateY(110%); transition: transform .2s; }
  .editor.open { transform: none; }
  .editor h4 { font-size: 15px; font-weight: 600; }
  .editor .sub { color: var(--muted); font-size: 12.5px; margin-bottom: 12px; }
  .steppers { display: flex; gap: 18px; margin-bottom: 14px; }
  .stepper { flex: 1; }
  .stepper label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
  .stepper .row { display: flex; align-items: center; gap: 10px; }
  .stepper button { width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--line); background: var(--card2); color: var(--text); font-size: 22px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .stepper .val { flex: 1; text-align: center; font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .editor-actions { display: flex; gap: 10px; }
  .editor-actions button { flex: 1; padding: 13px; border-radius: 12px; border: 1px solid var(--line); background: var(--card2); color: var(--text); font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .editor-actions .save { background: var(--amber); border-color: var(--amber); color: #14171a; flex: 2; }
  .editor-actions .del { color: #e57373; }
  .scrim { position: fixed; inset: 0; z-index: 25; background: rgba(0,0,0,.4); display: none; }
  .scrim.open { display: block; }

  .log-session { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; }
  .log-session h3 { font-size: 15px; }
  .log-session .d { color: var(--muted); font-size: 12.5px; margin-bottom: 8px; }
  .log-session table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .log-session td { padding: 3px 0; color: var(--muted); }
  .log-session td:last-child { text-align: right; color: var(--text); font-variant-numeric: tabular-nums; }
  .log-actions { display: flex; gap: 10px; margin: 16px 0 26px; }
  .log-actions button, .log-actions label { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: var(--card); color: var(--text); font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; text-align: center; }
  .log-empty { color: var(--muted); text-align: center; padding: 40px 20px; font-size: 14px; }

  .timer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; background: rgba(29,33,38,.97); backdrop-filter: blur(8px); border-top: 1px solid var(--line); padding: 10px 20px calc(12px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: stretch; gap: 10px; }
  .restrow { display: flex; align-items: center; gap: 10px; }
  .sessrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; min-height: 40px; }
  .sess-start { flex: 1; padding: 11px; border-radius: 10px; border: 1px dashed var(--line); background: none; color: var(--muted); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .sess-info { display: flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 600; }
  .sess-info .t { font-variant-numeric: tabular-nums; font-stretch: condensed; font-size: 19px; font-weight: 700; color: var(--amber); }
  .sess-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--amber); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .sess-end { padding: 10px 16px; border-radius: 10px; border: 1px solid var(--line); background: var(--card2); color: var(--text); font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .clock { font-size: 32px; font-stretch: condensed; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 84px; line-height: 1; }
  .clock.on { color: var(--amber); }
  .timer button { padding: 11px 14px; border-radius: 10px; border: 1px solid var(--line); background: var(--card2); color: var(--text); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .timer button.go { background: var(--amber); border-color: var(--amber); color: #14171a; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<header><h1 class="display">3er-Split</h1><span>Progressionsbasiert</span></header>
<div class="tabs" id="tabs"></div>
<div class="progress"><i id="bar"></i></div>
<main id="days"></main>

<div class="scrim" id="scrim"></div>
<div class="editor" id="editor"></div>

<div class="timer">
  <div class="sessrow" id="sessbar"></div>
  <div class="restrow">
    <div class="clock" id="clock">0:00</div>
    <button class="go" onclick="startTimer(90)">90s</button>
    <button class="go" onclick="startTimer(120)">2:00</button>
    <button class="go" onclick="startTimer(180)">3:00</button>
    <button onclick="stopTimer()">Stopp</button>
  </div>
</div>

<script>
/* ── Schematische Positionsbilder ── */
const S = (inner) => `<svg viewBox="0 0 120 90" fill="none" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
const F = 'stroke="#e9e7df" stroke-width="5"';
const A = 'stroke="#f2c94c" stroke-width="4"';
const H = 'stroke="#e9e7df" stroke-width="5" fill="none"';

const SVGS = {
  pullupTop: S(`<line x1="14" y1="18" x2="106" y2="18" ${A}/><circle cx="60" cy="10" r="6" ${H}/><path d="M60 24 L44 18 M60 24 L76 18" ${F}/><path d="M60 24 L60 52 M60 52 L54 80 M60 52 L66 80" ${F}/>`),
  deadhang: S(`<line x1="14" y1="14" x2="106" y2="14" ${A}/><circle cx="60" cy="28" r="6" ${H}/><path d="M48 14 L57 32 M72 14 L63 32" ${F}/><path d="M60 34 L60 58 M60 58 L55 84 M60 58 L65 84" ${F}/>`),
  shrug: S(`<line x1="14" y1="14" x2="106" y2="14" ${A}/><path d="M88 34 L88 22 M84 26 L88 22 L92 26" ${A}/><circle cx="58" cy="28" r="6" ${H}/><path d="M46 14 L55 32 M70 14 L61 32" ${F}/><path d="M58 34 L58 58 M58 58 L53 84 M58 58 L63 84" ${F}/>`),
  archer: S(`<line x1="14" y1="14" x2="106" y2="14" ${A}/><circle cx="46" cy="24" r="6" ${H}/><path d="M46 30 L38 14 M46 30 L88 15" ${F}/><path d="M46 30 L46 56 M46 56 L41 82 M46 56 L51 82" ${F}/>`),
  barSupport: S(`<line x1="14" y1="36" x2="106" y2="36" ${A}/><circle cx="60" cy="12" r="6" ${H}/><path d="M60 20 L46 36 M60 20 L74 36" ${F}/><path d="M60 20 L57 48 M57 48 L50 74" ${F}/>`),
  muTrans: S(`<line x1="14" y1="28" x2="106" y2="28" ${A}/><circle cx="74" cy="18" r="6" ${H}/><path d="M68 24 L58 30 M58 30 L48 46" ${F}/><path d="M62 28 L58 30 M74 28 L68 25" ${F}/><path d="M48 46 L40 72" ${F}/>`),
  dipsDeep: S(`<path d="M38 38 L52 38 M68 38 L82 38" ${A}/><circle cx="60" cy="20" r="6" ${H}/><path d="M60 28 L72 24 L72 38 M60 28 L48 24 L48 38" ${F}/><path d="M60 28 L58 52 M58 52 L50 66 L54 80" ${F}/>`),
  row: S(`<line x1="26" y1="30" x2="90" y2="30" ${A}/><line x1="14" y1="72" x2="106" y2="72" ${A}/><circle cx="38" cy="38" r="6" ${H}/><path d="M44 30 L46 42 M46 42 L94 70" ${F}/>`),
  tuckFL: S(`<line x1="14" y1="14" x2="106" y2="14" ${A}/><circle cx="40" cy="34" r="6" ${H}/><path d="M46 14 L46 36 M72 14 L66 34" ${F}/><path d="M46 36 L66 38 M66 38 L74 50 L64 54" ${F}/>`),
  curl: S(`<line x1="14" y1="80" x2="106" y2="80" ${A}/><circle cx="54" cy="14" r="6" ${H}/><path d="M54 20 L54 50 M54 50 L49 80 M54 50 L59 80" ${F}/><path d="M54 26 L58 42 M58 42 L72 30" ${F}/><path d="M72 30 L72 62" ${A}/>`),
  lsit: S(`<line x1="14" y1="66" x2="106" y2="66" ${A}/><circle cx="36" cy="24" r="6" ${H}/><path d="M36 30 L36 56 M36 34 L30 66" ${F}/><path d="M36 56 L80 52 M36 58 L80 60" ${F}/>`),
  pppu: S(`<line x1="14" y1="74" x2="106" y2="74" ${A}/><circle cx="26" cy="34" r="6" ${H}/><path d="M32 38 L92 62 M92 62 L98 74" ${F}/><path d="M38 42 L54 74" ${F}/>`),
  tuckPl: S(`<line x1="14" y1="74" x2="106" y2="74" ${A}/><circle cx="34" cy="38" r="6" ${H}/><path d="M40 44 L62 50 M62 50 L74 60 L64 66" ${F}/><path d="M44 48 L48 74" ${F}/>`),
  pike: S(`<line x1="14" y1="74" x2="106" y2="74" ${A}/><circle cx="30" cy="60" r="5" ${H}/><path d="M34 74 L60 32 M60 32 L92 74" ${F}/>`),
  hspu: S(`<line x1="14" y1="80" x2="106" y2="80" ${A}/><line x1="96" y1="10" x2="96" y2="80" ${A}/><circle cx="58" cy="66" r="6" ${H}/><path d="M60 60 L62 34 M62 34 L84 20" ${F}/><path d="M60 60 L52 80 M62 40 L58 80" ${F}/>`),
  decline: S(`<line x1="14" y1="74" x2="106" y2="74" ${A}/><rect x="84" y="54" width="22" height="20" ${A}/><circle cx="22" cy="46" r="6" ${H}/><path d="M28 50 L88 54 M34 52 L34 74" ${F}/>`),
  fly: S(`<path d="M30 6 L30 28 M90 6 L90 28" ${A}/><circle cx="60" cy="14" r="6" ${H}/><path d="M60 22 L60 52 M60 26 L30 28 M60 26 L90 28" ${F}/><path d="M60 52 L52 80 M60 52 L68 80" ${F}/>`),
  triceps: S(`<line x1="14" y1="80" x2="106" y2="80" ${A}/><circle cx="56" cy="16" r="6" ${H}/><path d="M56 22 L56 52 M56 52 L51 80 M56 52 L61 80" ${F}/><path d="M56 26 L68 12 M68 12 L76 24" ${F}/><path d="M76 24 L76 56" ${A}/>`),
  pistol: S(`<line x1="14" y1="76" x2="106" y2="76" ${A}/><circle cx="64" cy="14" r="6" ${H}/><path d="M62 20 L56 44 M58 28 L84 32" ${F}/><path d="M56 44 L44 58 L52 76 M56 44 L88 50" ${F}/>`),
  split: S(`<line x1="14" y1="76" x2="106" y2="76" ${A}/><rect x="84" y="58" width="22" height="18" ${A}/><circle cx="52" cy="14" r="6" ${H}/><path d="M52 20 L52 42" ${F}/><path d="M52 42 L44 60 L48 76 M52 42 L74 52 L90 58" ${F}/>`),
  nordic: S(`<line x1="14" y1="70" x2="106" y2="70" ${A}/><rect x="88" y="60" width="16" height="10" ${A}/><circle cx="36" cy="30" r="6" ${H}/><path d="M40 35 L78 64 M78 64 L92 66" ${F}/><path d="M48 42 L42 58" ${F}/>`),
  calf: S(`<line x1="14" y1="80" x2="106" y2="80" ${A}/><rect x="42" y="64" width="30" height="16" ${A}/><circle cx="58" cy="10" r="6" ${H}/><path d="M58 16 L58 44 M58 44 L56 60 M56 60 L50 56" ${F}/>`),
  legraise: S(`<line x1="14" y1="14" x2="106" y2="14" ${A}/><circle cx="58" cy="28" r="6" ${H}/><path d="M46 14 L55 32 M70 14 L61 32" ${F}/><path d="M58 34 L58 54 M58 54 L88 50 M58 56 L88 58" ${F}/>`),
  t2b: S(`<line x1="14" y1="14" x2="106" y2="14" ${A}/><circle cx="58" cy="30" r="6" ${H}/><path d="M46 14 L55 34 M70 14 L61 34" ${F}/><path d="M58 36 L58 50 M58 50 L78 22" ${F}/>`),
  hollow: S(`<line x1="14" y1="66" x2="106" y2="66" ${A}/><circle cx="28" cy="46" r="5" ${H}/><path d="M32 50 L58 62 M58 62 L92 48" ${F}/><path d="M30 48 L14 40" ${F}/>`),
  sideplank: S(`<line x1="14" y1="72" x2="106" y2="72" ${A}/><circle cx="26" cy="44" r="6" ${H}/><path d="M26 72 L44 72 M30 52 L96 72" ${F}/><path d="M36 54 L40 32" ${F}/>`)
};

/* ── Plan: Slots mit Progressionsleitern ──
   Level: { name, reps, rest, query, svg, pos, exec, fehler, opts:{w,t}, up }
   up = Freischalt-Schwelle pro Satz (alle Sätze in 2 Einheiten hintereinander erreicht) */
const PLAN = [
  { name: "Tag A", sub: "Pull · Muscle-up", slots: [
    { block: "Skill", levels: [
      { name: "Explosive Klimmzüge", reps: "5 × 3", rest: 180, query: "explosive pull up chest to bar tutorial", svg: "pullupTop", up: 3,
        pos: "Schulterbreiter Obergriff, voller Hang, Schulterblätter leicht angespannt – nicht komplett passiv hängen.",
        exec: "Aus dem Stand heraus maximal explosiv ziehen, Ellenbogen nach unten-hinten reißen, Ziel: Stange auf Brusthöhe. Oben kurz „schweben“, kontrolliert ablassen, unten komplett strecken, 1–2 Sek. sammeln, nächste Wiederholung.",
        fehler: "Kippen/Schwungholen aus der Hüfte · nur bis zum Kinn ziehen statt zur Brust · Wiederholungen aneinanderreihen ohne volle Streckung unten.",
        reg: "Leichter: normale Klimmzüge mit maximal explosiver Absicht oder leichtes Band. Schwerer: höher zielen (Bauchnabel zur Stange)." },
      { name: "Muscle-up (Stange)", reps: "5 × 1–3", rest: 180, query: "first muscle up bar tutorial", svg: "muTrans", up: 3,
        pos: "Griff etwas enger als schulterbreit, falscher Griff (Handgelenke über der Stange) hilft enorm. Kleiner, kontrollierter Vorschwung ist erlaubt.",
        exec: "Explosiv bis zur unteren Brust ziehen, im höchsten Punkt Ellenbogen blitzschnell über die Stange kippen (Brust „über die Stange lehnen“), dann aus dem Stütz ausdrücken. Runter in umgekehrter Reihenfolge – die Negative langsam!",
        fehler: "Zu früh umgreifen wollen (erst Höhe, dann Transition) · Hühnerflügel: ein Ellenbogen kommt zuerst · aus purer Kraft ziehen statt Zug + Lean kombinieren.",
        reg: "Leichter: Band um die Füße oder niedrigere Stange mit Mini-Absprung. Schwerer: mehrere Wiederholungen ohne jeden Vorschwung." }
    ]},
    { block: "Skill", levels: [
      { name: "Straight Bar Dips", reps: "4 × 6–8", rest: 120, query: "straight bar dips tutorial", svg: "barSupport", up: 8,
        pos: "Stütz auf einer Stange (Hüfthöhe), Arme gestreckt, Stange an der Hüfte, Beine leicht vor dem Körper, Schultern runter.",
        exec: "Oberkörper nach vorn über die Stange lehnen und Ellenbogen beugen, bis die Stange die untere Brust berührt. Dann zurückdrücken bis zur vollen Streckung. Die Vorlage bleibt die ganze Zeit bestehen.",
        fehler: "Zu aufrecht bleiben (dann kippst du nach hinten weg) · Schultern hochziehen · nur halbe Tiefe.",

      { name: "Dead Hang", reps: "2 × max", rest: 90, query: "dead hang form benefits", svg: "deadhang", up: null, opts: { t: 1 },

/* Lookup: slotKey -> Slot; logKey -> {slot, lvl} */
const SLOTS = {};
PLAN.forEach((d, di) => d.slots.forEach((s, si) => { SLOTS[`${di}-${si}`] = { ...s, di, si }; }));
const logKeyOf = (slotKey, lvl) => lvl === 0 ? slotKey : `${slotKey}@${lvl}`;
function parseLogKey(k) {
  const [slotKey, lvlStr] = k.split("@");
  const slot = SLOTS[slotKey];
  if (!slot) return null;
  const lvl = Math.min(lvlStr ? +lvlStr : 0, slot.levels.length - 1);
  return { slotKey, lvl, slot, x: slot.levels[lvl] };
}

/* ── Storage ── */
const store = {
  get(k, f) { try { return JSON.parse(localStorage.getItem(k)) ?? f; } catch { return f; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};
let log = store.get("cali-log", {});
let prog = store.get("cali-prog", {});   /* slotKey -> aktueller Level-Index */
let sess = store.get("cali-sess", null); /* { start: ts, day: di } */
let durs = store.get("cali-durs", {});   /* datum -> { day, dur } */
let activeTab = store.get("cali-day", 0);
let openDetails = {};

const today = () => new Date().toISOString().slice(0, 10);
const nSets = s => parseInt(s) || 3;
const fmtRest = s => s >= 60 ? (s % 60 ? `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")} min` : `${s/60} min`) : `${s} s`;
const fmtDate = iso => new Date(iso + "T12:00").toLocaleDateString("de-DE", { weekday: "short", day: "2-digit", month: "2-digit" });
const curLvl = slotKey => Math.min(prog[slotKey] || 0, SLOTS[slotKey].levels.length - 1);

function entryFor(logKey, date, create) {
  log[logKey] = log[logKey] || [];
  let e = log[logKey].find(x => x.d === date);
  if (!e && create) { e = { d: date, s: [] }; log[logKey].push(e); }
  return e;
}
function lastEntry(logKey) {
  const arr = (log[logKey] || []).filter(x => x.d !== today() && x.s.some(v => v));
  return arr.length ? arr[arr.length - 1] : null;
}
function saveAll() { store.set("cali-log", log); store.set("cali-prog", prog); store.set("cali-sess", sess); store.set("cali-durs", durs); }
const fmtDur = s => {
  s = Math.round(s);
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), sec = s % 60;
  return h ? `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}` : `${m}:${String(sec).padStart(2,"0")}`;
};
function startSession() {
  sess = { start: Date.now(), day: activeTab < 3 ? activeTab : 0 };
  saveAll(); renderSession();
}
function endSession() {
  if (!sess) return;
  const dur = (Date.now() - sess.start) / 1000;
  if (dur >= 60) {
    const d = today();
    durs[d] = { day: durs[d] ? durs[d].day : sess.day, dur: (durs[d] ? durs[d].dur : 0) + dur };
  }
  sess = null; saveAll(); renderSession();
}
function renderSession() {
  const el = document.getElementById("sessbar");
  if (!el) return;
  if (sess) {
    el.innerHTML = `<div class="sess-info"><span class="sess-dot"></span><span>${PLAN[sess.day].name}</span><span class="t" id="sessTime">${fmtDur((Date.now() - sess.start) / 1000)}</span></div><button class="sess-end" id="sessEnd">Training beenden</button>`;
    document.getElementById("sessEnd").onclick = () => { if (confirm("Training beenden und Zeit speichern?")) endSession(); };
  } else {
    el.innerHTML = `<button class="sess-start" id="sessStart">▶ Training starten</button>`;
    document.getElementById("sessStart").onclick = startSession;
  }
}
setInterval(() => {
  if (!sess) return;
  const t = document.getElementById("sessTime");
  if (t) t.textContent = fmtDur((Date.now() - sess.start) / 1000);
}, 1000);

/* Freischalt-Logik: letzte 2 abgeschlossenen Einheiten der aktuellen Stufe
   mit voller Satzzahl und allen Werten >= up */
function readyToProgress(slotKey) {
  const slot = SLOTS[slotKey];
  const lvl = curLvl(slotKey);
  if (lvl >= slot.levels.length - 1) return false;
  const x = slot.levels[lvl];
  if (!x.up) return false;
  const need = nSets(x.reps);
  const entries = (log[logKeyOf(slotKey, lvl)] || []).filter(e => e.s.filter(v => v).length >= need);
  if (entries.length < 2) return false;
  const lastTwo = entries.slice(-2);
  return lastTwo.every(e => e.s.filter(v => v).every(v => v[0] >= x.up));
}

/* ── Render ── */
function render() {
  const tabs = document.getElementById("tabs");
  const days = document.getElementById("days");
  tabs.innerHTML = ""; days.innerHTML = "";

  const tabDefs = [...PLAN.map((d, i) => ({ label: d.name, sub: d.sub, id: i })), { label: "Log", sub: "Verlauf", id: 3 }];
  tabDefs.forEach(t => {
    const b = document.createElement("button");
    b.innerHTML = `<span class="display">${t.label}</span><small>${t.sub}</small>`;
    b.className = t.id === activeTab ? "active" : "";
    b.onclick = () => { activeTab = t.id; store.set("cali-day", t.id); render(); };
    tabs.appendChild(b);
  });

  if (activeTab === 3) { renderLog(days); document.getElementById("bar").style.width = 0; return; }

  const di = activeTab;
  const sec = document.createElement("section");
  sec.className = "day active";

  PLAN[di].slots.forEach((slot, si) => {
    const slotKey = `${di}-${si}`;
    const lvl = curLvl(slotKey);
    const x = slot.levels[lvl];
    const logKey = logKeyOf(slotKey, lvl);
    const entry = entryFor(logKey, today(), false);
    const done = entry ? entry.s : [];
    const last = lastEntry(logKey);
    const unit = x.opts?.t ? "s" : "";
    const multi = slot.levels.length > 1;

    let lastLine = "";
    if (last) {
      const vals = last.s.filter(v => v).map(v => v[0] + unit + (v[1] ? `@${v[1]}kg` : "")).join(" · ");
      lastLine = `<div class="last">Zuletzt (${fmtDate(last.d)}): ${vals}</div>`;
    }

    const unlock = readyToProgress(slotKey)
      ? `<button class="unlock" data-u="${slotKey}">↑ Freischalten: ${slot.levels[lvl + 1].name}</button>` : "";

    const ladder = multi ? `<div class="ladder">
        <div class="ladder-title">Progression</div>
        ${slot.levels.map((l, i) => `<div class="step ${i === lvl ? "cur" : i < lvl ? "done" : "locked"}">
          <span class="dot">${i < lvl ? "✓" : i === lvl ? "" : "🔒"}</span>
          <span class="stepname">${l.name}${i === lvl ? '<em>Aktuelle Stufe</em>' : ""}</span>
        </div>`).join("")}
        <div class="ladder-btns">
          ${lvl > 0 ? `<button class="lvlbtn" data-down="${slotKey}">← Stufe zurück</button>` : ""}
          ${lvl < slot.levels.length - 1 ? `<button class="lvlbtn amber" data-upm="${slotKey}">Nächste Stufe freischalten</button>` : ""}
        </div>
      </div>` : "";

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="block ${slot.block.toLowerCase()}"><span>${slot.block}</span>${multi ? `<span class="lvl">Stufe ${lvl + 1}/${slot.levels.length}</span>` : ""}</div>
      <h3>${x.name}</h3>
      <div class="meta"><b>${x.reps}</b> · Pause ${fmtRest(x.rest)} ·
        <a target="_blank" rel="noopener" href="https://www.youtube.com/results?search_query=${encodeURIComponent(x.query)}">▶ Tutorial</a></div>
      ${lastLine}
      ${unlock}
      <details data-d="${slotKey}"${openDetails[slotKey] ? " open" : ""}>
        <summary>Technik</summary>
        <div class="detail-body">
          <div class="detail-top">${SVGS[x.svg] || ""}<p>${x.pos}</p></div>
          <div class="sec"><b>Ausführung</b>${x.exec}</div>
          <div class="sec warn"><b>Häufige Fehler</b>${x.fehler}</div>
          ${x.reg ? `<div class="sec"><b>Leichter · Schwerer</b>${x.reg}</div>` : ""}
          ${ladder}
        </div>
      </details>
      <div class="sets">${Array.from({length: nSets(x.reps)}, (_, i2) => {
        const v = done[i2];
        return `<button class="set${v ? " done" : ""}" data-k="${logKey}" data-s="${i2}">${v ? v[0] + unit + (v[1] ? "+" + v[1] : "") : i2 + 1}</button>`;
      }).join("")}</div>`;
    sec.appendChild(card);
  });

  const r = document.createElement("button");
  r.className = "reset";
  r.textContent = `Heutige Einträge für ${PLAN[di].name} löschen`;
  r.onclick = () => {
    PLAN[di].slots.forEach((slot, si) => {
      const lk = logKeyOf(`${di}-${si}`, curLvl(`${di}-${si}`));
      if (log[lk]) log[lk] = log[lk].filter(x => x.d !== today());
    });
    saveAll(); render();
  };
  sec.appendChild(r);
  days.appendChild(sec);

  days.querySelectorAll("details").forEach(d =>
    d.addEventListener("toggle", () => { openDetails[d.dataset.d] = d.open; }));
  days.querySelectorAll(".set").forEach(b =>
    b.onclick = () => openEditor(b.dataset.k, +b.dataset.s));
  days.querySelectorAll("[data-u]").forEach(b => b.onclick = () => {
    prog[b.dataset.u] = curLvl(b.dataset.u) + 1; saveAll(); render();
  });
  days.querySelectorAll("[data-upm]").forEach(b => b.onclick = () => {
    if (confirm("Nächste Stufe freischalten? Die aktuelle Übung wird ersetzt, die Historie bleibt im Log erhalten.")) {
      prog[b.dataset.upm] = curLvl(b.dataset.upm) + 1; saveAll(); render();
    }
  });
  days.querySelectorAll("[data-down]").forEach(b => b.onclick = () => {
    prog[b.dataset.down] = Math.max(0, curLvl(b.dataset.down) - 1); saveAll(); render();
  });

  let total = 0, doneN = 0;
  PLAN[di].slots.forEach((slot, si) => {
    const lvl = curLvl(`${di}-${si}`);
    total += nSets(slot.levels[lvl].reps);
    const en = entryFor(logKeyOf(`${di}-${si}`, lvl), today(), false);
    if (en) en.s.forEach(v => v && doneN++);
  });
  document.getElementById("bar").style.width = (total ? doneN / total * 100 : 0) + "%";
}

function renderLog(days) {
  const sec = document.createElement("section");
  sec.className = "day active";

  const byDate = {};
  Object.entries(log).forEach(([key, entries]) => entries.forEach(en => {
    if (!en.s.some(v => v)) return;
    (byDate[en.d] = byDate[en.d] || []).push({ key, en });
  }));
  const dates = Object.keys(byDate).sort().reverse();

  if (!dates.length) {
    sec.innerHTML = `<div class="log-empty">Noch keine Einheiten geloggt.<br>Tippe im Training auf einen Satz-Kreis, um Wiederholungen einzutragen.</div>`;
  }

  dates.forEach(d => {
    const items = byDate[d].map(it => ({ ...it, p: parseLogKey(it.key) })).filter(it => it.p);
    if (!items.length) return;
    const dayName = PLAN[items[0].p.slot.di].name;
    const box = document.createElement("div");
    box.className = "log-session";
    box.innerHTML = `<h3>${dayName}</h3><div class="d">${fmtDate(d)}${durs[d] ? ` · ${fmtDur(durs[d].dur)} h` : ""}</div>
      <table>${items.map(({ p, en }) => {
        const unit = p.x.opts?.t ? "s" : "";
        const vals = en.s.map(v => v ? v[0] + unit + (v[1] ? `@${v[1]}` : "") : "–").join(" / ");
        return `<tr><td>${p.x.name}</td><td>${vals}</td></tr>`;
      }).join("")}</table>`;
    sec.appendChild(box);
  });

  const actions = document.createElement("div");
  actions.className = "log-actions";
  actions.innerHTML = `<button id="exportBtn">Export (JSON)</button><label for="importFile">Import</label><input type="file" id="importFile" accept=".json" style="display:none">`;
  sec.appendChild(actions);
  days.appendChild(sec);

  document.getElementById("exportBtn").onclick = () => {
    const blob = new Blob([JSON.stringify({ version: 3, exported: new Date().toISOString(), log, prog, durs }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `calisthenics-log-${today()}.json`;
    a.click(); URL.revokeObjectURL(a.href);
  };
  document.getElementById("importFile").onchange = ev => {
    const f = ev.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const data = JSON.parse(rd.result);
        if (data.log && typeof data.log === "object") {
          log = data.log; prog = data.prog || {}; durs = data.durs || {}; saveAll(); render();
        } else alert("Ungültiges Format");
      } catch { alert("Datei konnte nicht gelesen werden"); }
    };
    rd.readAsText(f);
  };
}

/* ── Satz-Editor ── */
let ed = null;
function openEditor(logKey, si2) {
  const p = parseLogKey(logKey);
  if (!p) return;
  const x = p.x;
  const entry = entryFor(logKey, today(), false);
  const existing = entry && entry.s[si2];
  const last = lastEntry(logKey);
  let val, wt = 0;
  if (existing) { val = existing[0]; wt = existing[1] || 0; }
  else if (last && last.s[si2]) { val = last.s[si2][0]; wt = last.s[si2][1] || 0; }
  else if (entry && entry.s[si2 - 1]) { val = entry.s[si2 - 1][0]; wt = entry.s[si2 - 1][1] || 0; }
  else val = x.opts?.t ? 10 : (x.up || 8);
  ed = { logKey, si: si2, val, wt, existing: !!existing };
  drawEditor();
  document.getElementById("editor").classList.add("open");
  document.getElementById("scrim").classList.add("open");
}
function drawEditor() {
  const p = parseLogKey(ed.logKey);
  const x = p.x;
  const unitLabel = x.opts?.t ? "Sekunden" : "Wiederholungen";
  document.getElementById("editor").innerHTML = `
    <h4>${x.name}</h4>
    <div class="sub">Satz ${ed.si + 1} von ${nSets(x.reps)} · Ziel ${x.reps}</div>
    <div class="steppers">
      <div class="stepper"><label>${unitLabel}</label>
        <div class="row"><button data-a="v-">−</button><div class="val">${ed.val}</div><button data-a="v+">+</button></div></div>
      ${x.opts?.w ? `<div class="stepper"><label>Zusatzgewicht (kg)</label>
        <div class="row"><button data-a="w-">−</button><div class="val">${ed.wt}</div><button data-a="w+">+</button></div></div>` : ""}
    </div>
    <div class="editor-actions">
      ${ed.existing ? '<button class="del" data-a="del">Löschen</button>' : ""}
      <button data-a="cancel">Abbrechen</button>
      <button class="save" data-a="save">Speichern</button>
    </div>`;
  document.getElementById("editor").querySelectorAll("button").forEach(b => b.onclick = () => {
    const a = b.dataset.a, step = p.x.opts?.t ? 5 : 1;
    if (a === "v+") { ed.val += step; drawEditor(); }
    else if (a === "v-") { ed.val = Math.max(1, ed.val - step); drawEditor(); }
    else if (a === "w+") { ed.wt += 2.5; drawEditor(); }
    else if (a === "w-") { ed.wt = Math.max(0, ed.wt - 2.5); drawEditor(); }
    else if (a === "save") {
      const entry = entryFor(ed.logKey, today(), true);
      entry.s[ed.si] = [ed.val, ed.wt || 0];
      if (!sess) { sess = { start: Date.now(), day: activeTab < 3 ? activeTab : 0 }; renderSession(); }
      saveAll(); const rest = p.x.rest; closeEditor(); startTimer(rest); render();
    }
    else if (a === "del") {
      const entry = entryFor(ed.logKey, today(), false);
      if (entry) { entry.s[ed.si] = null; saveAll(); }
      closeEditor(); render();
    }
    else closeEditor();
  });
}
function closeEditor() {
  document.getElementById("editor").classList.remove("open");
  document.getElementById("scrim").classList.remove("open");
  ed = null;
}
document.getElementById("scrim").onclick = closeEditor;

/* ── Timer ── */
let timerId = null, remaining = 0;
function startTimer(sec) {
  clearInterval(timerId); remaining = sec; tick();
  timerId = setInterval(() => {
    remaining--; tick();
    if (remaining <= 0) { stopTimer(); navigator.vibrate?.([200, 100, 200]); }
  }, 1000);
}
function stopTimer() { clearInterval(timerId); timerId = null; remaining = 0; tick(); }
function tick() {
  const c = document.getElementById("clock");
  c.textContent = `${Math.floor(remaining/60)}:${String(remaining%60).padStart(2,"0")}`;
  c.className = "clock" + (timerId ? " on" : "");
}

render(); tick(); renderSession();
</script>
